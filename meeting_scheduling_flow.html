<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 群組會議自動排程流程</title>
<style>
  /* 字型：依需求一律使用微軟正黑體，後備字型供非 Windows 環境 */
  :root {
    --font: "Microsoft JhengHei", "微軟正黑體", "PingFang TC", "Heiti TC", sans-serif;

    /* 中性底色（外部輸入用） */
    --neutral-bg: #F0EFEA;
    --neutral-line: #C9C7BE;
    --neutral-text: #4A4A45;

    /* 輔色系：去飽和的次要色調（待確認，可替換為品牌正式輔色） */
    /* 階段一 讀取彙整 — 柔和青灰 */
    --c1-bg: #E8F0EE;
    --c1-line: #7BA8A0;
    --c1-text: #355450;
    /* 階段二 排程建議 — 柔和砂金 */
    --c2-bg: #F5EEDF;
    --c2-line: #C9A86A;
    --c2-text: #6B5424;
    /* 階段三 自動排會 — 柔和藕紫 */
    --c3-bg: #EFEAF2;
    --c3-line: #9B8AA8;
    --c3-text: #463B50;

    --page-bg: #FAFAF7;
    --title: #33332F;
    --sub: #76756E;
    --connector: #C2C0B7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--page-bg);
    color: var(--title);
    line-height: 1.7;
    padding: 48px 20px 64px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 560px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-size: 24px; font-weight: 600; letter-spacing: .5px; }
  header p { font-size: 14px; color: var(--sub); margin-top: 8px; }

  .flow { display: flex; flex-direction: column; align-items: center; }

  /* 步驟卡片 */
  .step {
    width: 100%;
    border-radius: 12px;
    padding: 18px 22px;
    border: 1px solid;
    text-align: center;
    opacity: 0;
    animation: rise .5s ease forwards;
  }
  .step .t { font-size: 17px; font-weight: 600; }
  .step .s { font-size: 13px; margin-top: 4px; }

  /* 各階段配色 */
  .neutral { background: var(--neutral-bg); border-color: var(--neutral-line); }
  .neutral .t, .neutral .s { color: var(--neutral-text); }
  .c1 { background: var(--c1-bg); border-color: var(--c1-line); }
  .c1 .t, .c1 .s { color: var(--c1-text); }
  .c2 { background: var(--c2-bg); border-color: var(--c2-line); }
  .c2 .t, .c2 .s { color: var(--c2-text); }
  .c3 { background: var(--c3-bg); border-color: var(--c3-line); }
  .c3 .t, .c3 .s { color: var(--c3-text); }

  /* 連接線 + 箭頭 */
  .connector {
    width: 2px;
    height: 28px;
    background: var(--connector);
    position: relative;
  }
  .connector::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 7px solid var(--connector);
  }

  /* 圖例 */
  .legend {
    margin-top: 44px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px 28px;
  }
  .legend .item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); }
  .legend .swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid; }
  .sw1 { background: var(--c1-bg); border-color: var(--c1-line); }
  .sw2 { background: var(--c2-bg); border-color: var(--c2-line); }
  .sw3 { background: var(--c3-bg); border-color: var(--c3-line); }

  .note {
    max-width: 560px; margin: 32px auto 0;
    font-size: 12px; color: var(--sub);
    text-align: center; line-height: 1.6;
  }

  /* 進場動畫（依序淡入） */
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .step { animation: none; opacity: 1; } }

  .step:nth-child(1) { animation-delay: .05s; }
  .step:nth-child(3) { animation-delay: .15s; }
  .step:nth-child(5) { animation-delay: .25s; }
  .step:nth-child(7) { animation-delay: .35s; }
  .step:nth-child(9) { animation-delay: .45s; }
  .step:nth-child(11){ animation-delay: .55s; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>LINE 群組會議自動排程流程</h1>
      <p>由群組訊息到排程建議的處理流程，顏色標示三個導入階段</p>
    </header>

    <div class="flow">
      <div class="step neutral">
        <div class="t">LINE 群組訊息</div>
        <div class="s">同事提出會議安排</div>
      </div>
      <div class="connector"></div>

      <div class="step c1">
        <div class="t">Webhook 即時接收</div>
        <div class="s">bot server 取得訊息</div>
      </div>
      <div class="connector"></div>

      <div class="step c1">
        <div class="t">LLM 語意解析</div>
        <div class="s">抽取時段、主題、與會者</div>
      </div>
      <div class="connector"></div>

      <div class="step c1">
        <div class="t">彙整與衝突偵測</div>
        <div class="s">合併、去重多則提議</div>
      </div>
      <div class="connector"></div>

      <div class="step c2">
        <div class="t">行事曆 free / busy</div>
        <div class="s">查詢共同可用時段</div>
      </div>
      <div class="connector"></div>

      <div class="step c3">
        <div class="t">排程建議與確認</div>
        <div class="s">回貼群組、人工確認</div>
      </div>
    </div>

    <div class="legend">
      <div class="item"><span class="swatch sw1"></span>階段一：讀取彙整</div>
      <div class="item"><span class="swatch sw2"></span>階段二：排程建議</div>
      <div class="item"><span class="swatch sw3"></span>階段三：自動排會</div>
    </div>

    <p class="note">輔色色票為示意值（待確認）；如需套用品牌正式輔色，請替換 CSS 變數 --c1-*、--c2-*、--c3-* 即可。</p>
  </div>
</body>
</html>
